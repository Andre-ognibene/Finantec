<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Meta - FINANTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background-color: #111827; padding: 25px; color: white; }
        .brand-logo { display: flex; align-items: center; font-weight: bold; font-size: 1.5rem; color: white; margin-bottom: 40px; gap: 10px; }
        .logo-icon { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 8px 12px; border-radius: 10px; }
        .nav-link { color: #9ca3af; padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; font-weight: 500; display: flex; align-items: center; }
        .nav-link:hover { background-color: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background-color: #2563eb; color: white; font-weight: 600; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        .form-card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); max-width: 800px; margin: 0 auto; }
        .form-label { font-weight: 600; color: #4b5563; }
    

        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #111827;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --sidebar: #111827;
            --border: #e5e7eb;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            --radius: 18px;
        }

        * { box-sizing: border-box; }
        body { min-height: 100vh; color: var(--text); }
        .container-fluid { overflow-x: hidden; }
        .sidebar {
            position: sticky;
            top: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
        }
        .brand-logo { white-space: nowrap; }
        .nav-link { gap: 12px; }
        .nav-link i { margin-right: 0 !important; flex: 0 0 auto; }
        .main-content { padding: 48px; }
        .card-custom, .section-box, .form-card, .meta-card, .card-config, .card-form, .card-invest, .simulador-box {
            border-radius: var(--radius) !important;
            box-shadow: var(--shadow) !important;
        }
        .form-control, .form-select, .btn { border-radius: 12px; }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 .2rem rgba(37, 99, 235, .12);
        }
        .progress { background-color: #e5e7eb; overflow: hidden; }
        .mobile-header {
            background: #111827;
            color: #fff;
            padding: 14px 16px;
            position: sticky;
            top: 0;
            z-index: 1030;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .2);
        }
        .mobile-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: .3px; }
        .mobile-menu { background: #111827; border-top: 1px solid rgba(255,255,255,.08); padding: 10px 16px 16px; }
        .mobile-menu .nav-link { color: #d1d5db; }
        .mobile-menu .nav-link.active { color: #fff; background-color: var(--primary); }
        .mobile-menu .nav-link.text-danger { color: #fca5a5 !important; }
        .btn-toggle-menu { border: 1px solid rgba(255,255,255,.16); color: #fff; background: rgba(255,255,255,.06); }
        .btn-toggle-menu:hover { background: rgba(255,255,255,.12); color: #fff; }
        .text-break-safe { word-break: break-word; }

        @media (max-width: 991.98px) {
            .main-content { padding: 28px 18px; }
            .d-flex.justify-content-between.align-items-center { gap: 16px; flex-wrap: wrap; }
            .card-value { font-size: 1.45rem !important; }
            .form-card, .card-config, .card-form, .simulador-box { padding: 24px !important; }
            .border-end { border-right: 0 !important; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
        }

        @media (max-width: 575.98px) {
            .main-content { padding: 22px 14px; }
            h2, .login-title { font-size: 1.55rem !important; }
            .btn, .form-control, .form-select { width: 100%; }
            .input-group .form-control { width: 1%; }
            .chart-header { align-items: flex-start !important; }
            .avatar-circle { width: 64px !important; height: 64px !important; font-size: 2rem !important; }
        }

    </style>
</head>
<body>

<div class="mobile-header d-md-none">
    <div class="d-flex align-items-center justify-content-between">
        <div class="mobile-brand"><span class="logo-icon"><i class="bi bi-graph-up-arrow"></i></span> FINANTEC</div>
        <button class="btn btn-toggle-menu btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu" aria-expanded="false" aria-controls="mobileMenu">
            <i class="bi bi-list fs-4"></i>
        </button>
    </div>
    <div class="collapse mobile-menu" id="mobileMenu">
        <nav class="nav flex-column mt-2">
            <a class="nav-link " href="{{ url_for('dashboard') }}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a class="nav-link " href="{{ url_for('transferir_form') }}"><i class="bi bi-arrow-left-right"></i> Movimentações</a>
            <a class="nav-link active" href="{{ url_for('metas') }}"><i class="bi bi-bullseye"></i> Controle de Metas</a>
            <a class="nav-link " href="{{ url_for('investimentos') }}"><i class="bi bi-graph-up"></i> Investimento</a>
            <a class="nav-link " href="{{ url_for('graficos') }}"><i class="bi bi-bar-chart-line"></i> Gráficos</a>
            <a class="nav-link " href="{{ url_for('perfil') }}"><i class="bi bi-gear-fill"></i> Configurações</a>
            <a class="nav-link text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Sair</a>
        </nav>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <div class="brand-logo"><span class="logo-icon"><i class="bi bi-graph-up-arrow"></i></span>FINANTEC</div>
            <nav class="nav flex-column">
                <a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a class="nav-link" href="{{ url_for('transferir_form') }}"><i class="bi bi-arrow-left-right"></i> Movimentações</a>
                <a class="nav-link active" href="{{ url_for('metas') }}"><i class="bi bi-bullseye"></i> Controle de Metas</a>
                <a class="nav-link" href="{{ url_for('investimentos') }}"><i class="bi bi-graph-up"></i> Investimento</a>
                <a class="nav-link" href="{{ url_for('graficos') }}"><i class="bi bi-bar-chart-line"></i> Gráficos</a>
                <div class="mt-5 border-top border-secondary pt-4"><a class="nav-link text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Sair</a></div>
            </nav>
        </div>

        <div class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-5 max-w-800 mx-auto" style="max-width: 800px;">
                <div><h2 class="fw-bold text-dark">Nova Meta</h2><p class="text-muted">Preencha os dados para começar.</p></div>
                <a href="{{ url_for('metas') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
            </div>

            <div class="form-card">
                <form method="POST" action="{{ url_for('criar_meta') }}">
                    <div class="mb-4">
                        <label class="form-label">Nome do Objetivo</label>
                        <input type="text" name="descricao" class="form-control form-control-lg" placeholder="Ex: Viagem para Europa..." required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Valor da Meta (R$)</label>
                            <input type="number" step="0.01" name="valor_meta" class="form-control form-control-lg" placeholder="0,00" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Saldo Inicial (R$)</label>
                            <input type="number" step="0.01" name="valor_atual" class="form-control form-control-lg" value="0">
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="form-label">Prazo Estipulado</label>
                        <input type="date" name="prazo" class="form-control form-control-lg">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold">Criar Meta</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
