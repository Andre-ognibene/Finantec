<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Meta - FINANTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background-color: #111827; padding: 25px; color: white; }
        .brand-logo { display: flex; align-items: center; font-weight: bold; font-size: 1.5rem; color: white; margin-bottom: 40px; gap: 10px; }
        .logo-icon { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 8px 12px; border-radius: 10px; }
        .nav-link { color: #9ca3af; padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; font-weight: 500; display: flex; align-items: center; }
        .nav-link:hover { background-color: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background-color: #2563eb; color: white; font-weight: 600; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        .form-card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); max-width: 800px; margin: 0 auto; }
        .form-label { font-weight: 600; color: #4b5563; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <div class="brand-logo"><span class="logo-icon"><i class="bi bi-graph-up-arrow"></i></span>FINANTEC</div>
            <nav class="nav flex-column">
                <a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a class="nav-link" href="{{ url_for('transferir_form') }}"><i class="bi bi-arrow-left-right"></i> Movimentações</a>
                <a class="nav-link active" href="{{ url_for('metas') }}"><i class="bi bi-bullseye"></i> Controle de Metas</a>
                <a class="nav-link" href="{{ url_for('investimentos') }}"><i class="bi bi-graph-up"></i> Investimento</a>
                <a class="nav-link" href="{{ url_for('graficos') }}"><i class="bi bi-bar-chart-line"></i> Gráficos</a>
                <div class="mt-5 border-top border-secondary pt-4"><a class="nav-link text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Sair</a></div>
            </nav>
        </div>

        <div class="col-md-10 p-5">
            <div class="d-flex justify-content-between align-items-center mb-5 max-w-800 mx-auto" style="max-width: 800px;">
                <div><h2 class="fw-bold text-dark">Nova Meta</h2><p class="text-muted">Preencha os dados para começar.</p></div>
                <a href="{{ url_for('metas') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
            </div>

            <div class="form-card">
                <form method="POST" action="{{ url_for('criar_meta') }}">
                    <div class="mb-4">
                        <label class="form-label">Nome do Objetivo</label>
                        <input type="text" name="descricao" class="form-control form-control-lg" placeholder="Ex: Viagem para Europa..." required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Valor da Meta (R$)</label>
                            <input type="number" step="0.01" name="valor_meta" class="form-control form-control-lg" placeholder="0,00" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Saldo Inicial (R$)</label>
                            <input type="number" step="0.01" name="valor_atual" class="form-control form-control-lg" value="0">
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="form-label">Prazo Estipulado</label>
                        <input type="date" name="prazo" class="form-control form-control-lg">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold">Criar Meta</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
