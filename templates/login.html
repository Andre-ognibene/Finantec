<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FINANTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-weight: bold;
            font-size: 2rem;
            text-align: center;
            color: #0d1b2a;
            margin-bottom: 5px;
        }

        .login-subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 500;
            color: #212529;
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            background-color: #fff;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        .btn-dark-custom {
            background-color: #0d1b2a; 
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: background 0.3s;
        }

        .btn-dark-custom:hover {
            background-color: #1b2a3a;
        }

        .links-area {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .links-area a {
            text-decoration: none;
            color: #6c757d;
        }

        .links-area a:hover {
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="login-title">Login</h1>
        <p class="login-subtitle">Preencha os dados para começar</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" name="email" required placeholder="seu@email.com">
            </div>
            
            <div class="mb-4">
                <label for="senha" class="form-label">Senha <span class="text-danger">*</span></label>
                <input type="password" class="form-control" name="senha" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-dark-custom">Login</button>
        </form>

        <div class="links-area">
            <p class="mb-1"><a href="#">Esqueceu a senha?</a></p>
            <p>Não tem uma conta? <a href="{{ url_for('cadastro') }}" style="color: #0d6efd; font-weight: 600;">Criar conta</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
